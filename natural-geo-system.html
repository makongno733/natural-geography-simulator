<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自然地理模拟系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#fffdf8;--card:#fffefa;--line:#e2c9b4;--text:#b01217;--muted:#b85a4d;--accent:#d12a2f}
    *{box-sizing:border-box}
    body{margin:0;font-family:"禹卫书法行书","STXingkai","Kaiti SC","KaiTi","DFKai-SB",serif;background:radial-gradient(circle at 15% 10%,rgba(255,243,214,.75) 0,rgba(255,252,244,.95) 42%,#fffef9 100%);background-color:var(--bg);background-image:repeating-linear-gradient(45deg,rgba(225,198,149,.08) 0 2px,transparent 2px 12px),repeating-linear-gradient(-45deg,rgba(225,198,149,.05) 0 1px,transparent 1px 10px);color:var(--text);min-height:100vh}
    .shell{width:min(1400px,94vw);margin:12px auto}
    .home{display:grid;place-items:center;min-height:92vh}
    .wrap{width:min(1200px,96vw);padding:28px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.94);box-shadow:0 10px 26px rgba(183,55,44,.16)}
    h1{margin:0 0 16px;font-size:clamp(56px,9vw,180px);line-height:0.95;letter-spacing:2px;text-align:center;text-shadow:0 10px 28px rgba(0,0,0,.32);white-space:nowrap;font-family:"Ma Shan Zheng","Zhi Mang Xing","禹卫书法行书","STXingkai","Kaiti SC","KaiTi",serif}
    p{margin:0 0 16px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .card{display:block;text-decoration:none;border:1px solid var(--line);border-radius:12px;padding:14px;background:linear-gradient(180deg,#fffefe,#fff8f2);color:var(--text);cursor:pointer}
    .card:hover{border-color:var(--accent);transform:translateY(-1px)}
    .t{font-size:18px;font-weight:700;margin-bottom:6px}
    .d{font-size:13px;color:var(--muted);line-height:1.5}
    .tips{margin-top:12px;font-size:12px;color:#b85a4d}
    .viewer{display:none;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.95);overflow:hidden}
    .viewer-head{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-bottom:1px solid #e7d2c2}
    .back{border:1px solid var(--line);background:#fff6ef;color:#b01217;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer}
    .name{font-size:14px;color:#b01217}
    iframe{display:block;width:100%;height:84vh;border:0;background:#fff}
    @media (max-width:740px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="shell">
    <section id="home" class="home">
      <div class="wrap">
        <h1>中学地理教学系统</h1>
        <p>总入口：选择一个子系统进入</p>
        <section class="grid">
          <article class="card" data-target="atmosphere">
            <div class="t">大气垂直结构与化学组成</div>
            <div class="d">3D大气分层、行星风带、季风、洋流及海气耦合可视化。</div>
          </article>
          <article class="card" data-target="landform">
            <div class="t">地貌演化与河流类型</div>
            <div class="d">戴维斯河流类型、地貌演化时间轴与3D地形交互。</div>
          </article>
        </section>
        <div class="tips">提示：点击卡片进入子页面，和 App 版一致。</div>
      </div>
    </section>
    <section id="viewer" class="viewer">
      <div class="viewer-head">
        <button class="back" id="backBtn">返回总入口</button>
        <div class="name" id="viewerName"></div>
      </div>
      <iframe id="viewerFrame" title="子页面"></iframe>
    </section>
  </main>

  <script>
    const home = document.getElementById('home');
    const viewer = document.getElementById('viewer');
    const viewerFrame = document.getElementById('viewerFrame');
    const viewerName = document.getElementById('viewerName');
    const backBtn = document.getElementById('backBtn');

    const pages = {
      atmosphere: { name: '大气垂直结构与化学组成', src: './atmosphere-draft.html' },
      landform: { name: '地貌演化与河流类型', src: './dist/index.html' }
    };

    document.querySelectorAll('.card[data-target]').forEach((card) => {
      card.addEventListener('click', () => {
        const key = card.dataset.target;
        const page = pages[key];
        viewerName.textContent = page.name;
        viewerFrame.src = page.src;
        home.style.display = 'none';
        viewer.style.display = 'block';
      });
    });

    backBtn.addEventListener('click', () => {
      viewerFrame.src = '';
      viewer.style.display = 'none';
      home.style.display = 'grid';
    });
  </script>
</body>
</html>
